<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0a08" />
  <title>Sandesh Pandey — links</title>
  <meta name="description" content="All of Sandesh Pandey's links in one place — portfolio, Kranti, LinkedIn, Instagram." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{ color-scheme:dark;
      --bg:#0d0a08; --brd:rgba(255,230,200,.14); --brd2:rgba(255,215,170,.34);
      --text:#f7efe6; --dim:rgba(247,239,230,.66); --amber:#ffb059; --cream:#ffe0b8;
      --grad:linear-gradient(120deg,#ffd784,#ff9d4d 55%,#ff6a3d); }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;
      -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;
      background-image:radial-gradient(120% 60% at 50% -10%,#3a1d0c 0%,transparent 50%),radial-gradient(100% 80% at 50% 120%,#1c1209 0%,transparent 55%);}
    .wrap{width:100%;max-width:520px;padding:clamp(40px,10vw,72px) 20px 60px;text-align:center}
    .avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;object-position:50% 30%;margin:0 auto 18px;
      border:2px solid var(--brd2);box-shadow:0 12px 34px -8px rgba(255,140,70,.45)}
    h1{font-family:'Bricolage Grotesque',sans-serif;font-size:1.8rem;letter-spacing:-.02em}
    .tagline{color:var(--dim);margin:8px 0 32px;font-size:1rem}
    .links{display:flex;flex-direction:column;gap:12px}
    .link{position:relative;display:flex;align-items:center;justify-content:center;
      padding:17px 58px;border-radius:16px;font-weight:600;font-size:1.05rem;
      background:rgba(255,255,255,.05);border:1px solid var(--brd);color:var(--text);
      -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
      transition:transform .18s,border-color .18s,background .18s}
    .link:hover{transform:translateY(-2px);border-color:var(--brd2);background:rgba(255,140,70,.13)}
    .link .ico{position:absolute;left:12px;width:40px;height:40px;border-radius:11px;display:grid;place-items:center;
      background:rgba(255,176,89,.14);border:1px solid var(--brd);color:var(--cream)}
    .link:hover .ico{color:#fff;background:rgba(255,140,70,.28)}
    .link .ico svg{width:22px;height:22px;display:block}
    footer{margin-top:36px;color:rgba(247,239,230,.4);font-size:.82rem}
    footer a{color:var(--amber);text-decoration:none}
    .empty{color:rgba(247,239,230,.5);padding:30px}
  </style>
</head>
<body>
  <div class="wrap">
    <img class="avatar" src="/assets/avatar-hub.jpg" alt="Sandesh Pandey" />
    <h1>Sandesh Pandey</h1>
    <p class="tagline" id="tagline">—</p>
    <div class="links" id="links"><div class="empty">Loading…</div></div>
    <footer>Made with <a href="/">sandeshpandey.info.np</a></footer>
  </div>

  <script>
    const ICONS = {
      linkedin:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5ZM3 9h4v12H3zM9 9h3.8v1.7h.05c.53-1 1.83-2.05 3.77-2.05C20.4 8.65 21 11 21 14.1V21h-4v-6.1c0-1.45-.03-3.3-2-3.3-2 0-2.3 1.57-2.3 3.2V21H9z"/></svg>',
      instagram:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.4" cy="6.6" r="1" fill="currentColor" stroke="none"/></svg>',
      youtube:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.6 7.2c-.2-.9-.9-1.6-1.8-1.8C18.2 5 12 5 12 5s-6.2 0-7.8.4c-.9.2-1.6.9-1.8 1.8C2 8.8 2 12 2 12s0 3.2.4 4.8c.2.9.9 1.6 1.8 1.8C5.8 19 12 19 12 19s6.2 0 7.8-.4c.9-.2 1.6-.9 1.8-1.8.4-1.6.4-4.8.4-4.8s0-3.2-.4-4.8ZM10 15V9l5 3-5 3Z"/></svg>',
      mail:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="m4 7 8 6 8-6"/></svg>',
      phone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L16 13l5 2v4a1 1 0 0 1-1 1A16 16 0 0 1 4 5a1 1 0 0 1 1-1Z"/></svg>',
      github:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2A10 10 0 0 0 8.8 21.5c.5.1.7-.2.7-.5v-1.7c-2.8.6-3.4-1.3-3.4-1.3-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.6.3-1.1.6-1.4-2.2-.3-4.6-1.1-4.6-5 0-1.1.4-2 1-2.7-.1-.3-.4-1.3.1-2.7 0 0 .8-.3 2.7 1a9.4 9.4 0 0 1 5 0c1.9-1.3 2.7-1 2.7-1 .5 1.4.2 2.4.1 2.7.6.7 1 1.6 1 2.7 0 3.9-2.3 4.7-4.6 5 .4.3.7.9.7 1.9v2.8c0 .3.2.6.7.5A10 10 0 0 0 12 2Z"/></svg>',
      x:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.9 2H22l-7.3 8.3L23 22h-6.6l-5.2-6.8L5.3 22H2l7.8-8.9L1.7 2h6.8l4.7 6.2L18.9 2Zm-1.2 18h1.8L7.4 3.8H5.5L17.7 20Z"/></svg>',
      facebook:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7h-2.5V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.2c-1.2 0-1.6.8-1.6 1.5V12h2.7l-.4 2.9h-2.3v7A10 10 0 0 0 22 12Z"/></svg>',
      tiktok:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 3c.3 2.2 1.8 3.9 4 4.2v2.7c-1.5 0-2.9-.5-4-1.2v6.1a5.8 5.8 0 1 1-5.8-5.8c.3 0 .6 0 .9.1v2.9a2.9 2.9 0 1 0 2 2.8V3H16Z"/></svg>',
      whatsapp:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.3A10 10 0 1 0 12 2Zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.9.8.8-2.8-.2-.3A8 8 0 1 1 12 20Zm4.4-6c-.2-.1-1.4-.7-1.6-.8-.2-.1-.4-.1-.5.1l-.7.8c-.1.2-.3.2-.5.1a6.5 6.5 0 0 1-3.2-2.8c-.1-.2 0-.4.1-.5l.4-.5c.1-.2.1-.3 0-.5l-.7-1.7c-.2-.4-.4-.4-.5-.4h-.5c-.2 0-.5.1-.7.3a3 3 0 0 0-.9 2.2c0 1.3.9 2.6 1.1 2.8.1.2 1.9 2.9 4.6 3.9 1.7.6 2.1.5 2.5.4.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1-.1-.1-.2-.2-.4-.3Z"/></svg>',
      globe:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.5 2.6 2.5 15.4 0 18M12 3c-2.5 2.6-2.5 15.4 0 18"/></svg>',
    };
    function iconFor(url){
      const u = (url||'').toLowerCase();
      if(u.startsWith('mailto:')) return ICONS.mail;
      if(u.startsWith('tel:')) return ICONS.phone;
      if(u.includes('linkedin.')) return ICONS.linkedin;
      if(u.includes('instagram.')) return ICONS.instagram;
      if(u.includes('youtube.')||u.includes('youtu.be')) return ICONS.youtube;
      if(u.includes('github.')) return ICONS.github;
      if(u.includes('twitter.')||u.includes('x.com')) return ICONS.x;
      if(u.includes('facebook.')||u.includes('fb.com')) return ICONS.facebook;
      if(u.includes('tiktok.')) return ICONS.tiktok;
      if(u.includes('wa.me')||u.includes('whatsapp')) return ICONS.whatsapp;
      return ICONS.globe;
    }
    (async () => {
      let data = { profile:{tagline:''}, links:[] };
      try { data = await (await fetch('/api/hub')).json(); } catch {}
      document.getElementById('tagline').textContent = data.profile?.tagline || '';
      const box = document.getElementById('links'); box.innerHTML='';
      if (!(data.links||[]).length) { box.innerHTML='<div class="empty">No links yet.</div>'; return; }
      for (const l of data.links) {
        const ext = /^https?:/i.test(l.url);
        const a = document.createElement('a');
        a.className='link'; a.href=l.url; if(ext){ a.target='_blank'; a.rel='noopener'; }
        const ico = document.createElement('span'); ico.className='ico'; ico.innerHTML = iconFor(l.url);
        const label = document.createElement('span'); label.textContent = l.title;
        a.append(ico, label); box.append(a);
      }
    })();
  </script>
</body>
</html>
