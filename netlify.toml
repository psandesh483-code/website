[build]
  command = "echo 'static site — no build step'"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Never serve the function source (or config) as static files.
[[redirects]]
  from = "/netlify/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/netlify.toml"
  to = "/404.html"
  status = 404
  force = true
